      <rect x="355" y="140" width="35" height="110" rx="17.5" fill="#FED7AA" transform="rotate(-45 355 140)" />
    
    
      <!-- Torse -->
      <rect x="155" y="190" width="190" height="150" rx="40" fill="#D97706" />
    
    <line x1="120" y1="180" x2="120" y2="420" stroke="#854D0E" stroke-width="17.5" stroke-linecap="round" />
