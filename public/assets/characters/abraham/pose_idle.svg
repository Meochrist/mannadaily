<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes droites -->
      <rect x="205" y="340" width="30" height="90" rx="15" fill="#FED7AA" />
      <rect x="265" y="340" width="30" height="90" rx="15" fill="#FED7AA" />
      <!-- Sandales / Chaussures nettes -->
      <path d="M190 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#D97706" />
      <path d="M260 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#D97706" />
      <!-- Bras ballants stables -->
      <path d="M135 240 v100" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M365 240 v100" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique drapée -->
      <rect x="145" y="215" width="210" height="150" rx="40" fill="#F59E0B" />
      <!-- Ombre nette sur la tunique pour donner de la profondeur (Duolingo 2.0) -->
      <path d="M145 270 C145 330, 355 330, 355 270 V325 C355 350, 145 350, 145 325 Z" fill="#D97706" opacity="0.3" />
    
    
      <line x1="110" y1="180" x2="110" y2="450" stroke="#78350F" stroke-width="16" stroke-linecap="round" />
    
  </svg>