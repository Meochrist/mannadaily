<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes légèrement pliées de tristesse -->
      <path d="M210 350 v60 h-10" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M290 350 v60 h10" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M185 400 h35 c5 0, 5 15, 0 15 h-35 z" fill="#D97706" />
      <path d="M280 400 h35 c5 0, 5 15, 0 15 h-35 z" fill="#D97706" />
      <!-- Bras refermés ou tombants d'abattement -->
      <path d="M140 250 Q115 310, 125 350" fill="none" stroke="#FED7AA" stroke-width="18" stroke-linecap="round" />
      <path d="M360 250 Q385 310, 375 350" fill="none" stroke="#FED7AA" stroke-width="18" stroke-linecap="round" />
    
    
      <!-- Torse affaissé (plus petit) -->
      <rect x="150" y="225" width="200" height="140" rx="35" fill="#F59E0B" />
    
    
      <line x1="110" y1="180" x2="110" y2="450" stroke="#78350F" stroke-width="16" stroke-linecap="round" />
    
  </svg>