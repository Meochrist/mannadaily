<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes rentrées vers l'intérieur (tristesse) -->
      <path d="M 215 340 L 230 410" fill="none" stroke="#FED7AA" stroke-width="24" stroke-linecap="round" />
      <path d="M 285 340 L 270 410" fill="none" stroke="#FED7AA" stroke-width="24" stroke-linecap="round" />
      <path d="M 200 405 C 200 418, 240 418, 240 400 C 240 390, 215 390, 200 405 Z" fill="#451A03" />
      <path d="M 300 405 C 300 418, 260 418, 260 400 C 260 390, 285 390, 300 405 Z" fill="#451A03" />
      <!-- Bras repliés vers le corps (abattement) -->
      <path d="M 145 220 Q 120 280, 140 330" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M 355 220 Q 380 280, 360 330" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique affaissée -->
      <path d="M 175 220 C 155 250, 135 320, 155 345 C 180 358, 320 358, 345 345 C 365 320, 345 250, 325 220 Z" fill="#78350F" />
      <path d="M 155 345 C 180 358, 320 358, 345 345 C 335 315, 165 315, 155 345 Z" fill="#451A03" opacity="0.25" />
    
    
      <g id="dove" transform="translate(100, 195)">
        <!-- Corps de la colombe -->
        <path d="M 10 15 C 10 0, 35 0, 40 10 C 45 5, 55 10, 50 20 C 45 25, 15 25, 10 15 Z" fill="#FFFFFF" stroke="#1E293B" stroke-width="4" />
        <!-- Bec orange -->
        <path d="M 38 7 L 48 5 L 42 12 Z" fill="#FBBF24" />
        <circle cx="30" cy="8" r="2.5" fill="#1E293B" />
        <!-- Aile de la colombe -->
        <path d="M 20 12 C 15 2, 5 8, 12 18 Z" fill="#E2E8F0" stroke="#1E293B" stroke-width="3" />
      </g>
    
  </svg>