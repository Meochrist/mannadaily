<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambe arrière en course -->
      <path d="M200 340 L160 400" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M140 395 h40 c5 0, 5 15, 0 15 h-40 z" fill="#451A03" transform="rotate(-15 140 395)" />
      <!-- Jambe avant en foulée -->
      <path d="M280 340 Q320 375, 300 420" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M285 415 h40 c5 0, 5 15, 0 15 h-40 z" fill="#451A03" transform="rotate(10 285 415)" />
      <!-- Bras de course fléchis -->
      <path d="M140 230 Q90 260, 115 300" fill="none" stroke="#FED7AA" stroke-width="18" stroke-linecap="round" />
      <path d="M360 220 Q400 190, 385 155" fill="none" stroke="#FED7AA" stroke-width="18" stroke-linecap="round" />
    
    
      <!-- Torse projeté vers l'avant -->
      <rect x="145" y="210" width="210" height="150" rx="40" fill="#78350F" transform="skewX(-8 250 285)" />
    
    
      <!-- Petite colombe plate mignonne -->
      <path d="M110 200 c5 -15, 25 -15, 30 0 v15 h-30z" fill="#FFFFFF" stroke="#1E293B" stroke-width="4" />
      <path d="M140 205 L155 195 L145 210 Z" fill="#FBBF24" /> <!-- Bec -->
      <circle cx="125" cy="205" r="2" fill="#1E293B" /> <!-- Oeil colombe -->
    
  </svg>