<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes repliées vers l'extérieur pour un saut dynamique -->
      <path d="M 210 330 Q 175 365, 185 395" fill="none" stroke="#FED7AA" stroke-width="24" stroke-linecap="round" />
      <path d="M 150 385 C 150 398, 195 400, 195 385 C 195 372, 165 372, 150 385 Z" fill="#451A03" transform="rotate(-15 150 385)" />
      
      <path d="M 290 330 Q 325 365, 315 395" fill="none" stroke="#FED7AA" stroke-width="24" stroke-linecap="round" />
      <path d="M 350 385 C 350 398, 305 400, 305 385 C 305 372, 335 372, 350 385 Z" fill="#451A03" transform="rotate(15 350 385)" />
      
      <!-- Bras levés de joie et de victoire -->
      <path d="M 150 210 Q 110 160, 100 125" fill="none" stroke="#FED7AA" stroke-width="22" stroke-linecap="round" />
      <path d="M 350 210 Q 390 160, 400 125" fill="none" stroke="#FED7AA" stroke-width="22" stroke-linecap="round" />
    
    
      <!-- Tunique étirée vers le haut -->
      <path d="M 175 195 C 155 230, 130 300, 155 335 C 180 350, 320 350, 345 335 C 370 300, 345 230, 325 195 Z" fill="#78350F" />
      <path d="M 155 335 C 180 350, 320 350, 345 335 C 335 305, 165 305, 155 335 Z" fill="#451A03" opacity="0.25" />
    
    
      <g id="dove" transform="translate(100, 195)">
        <!-- Corps de la colombe -->
        <path d="M 10 15 C 10 0, 35 0, 40 10 C 45 5, 55 10, 50 20 C 45 25, 15 25, 10 15 Z" fill="#FFFFFF" stroke="#1E293B" stroke-width="4" />
        <!-- Bec orange -->
        <path d="M 38 7 L 48 5 L 42 12 Z" fill="#FBBF24" />
        <circle cx="30" cy="8" r="2.5" fill="#1E293B" />
        <!-- Aile de la colombe -->
        <path d="M 20 12 C 15 2, 5 8, 12 18 Z" fill="#E2E8F0" stroke="#1E293B" stroke-width="3" />
      </g>
    
  </svg>