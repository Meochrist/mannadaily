<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes droites -->
      <rect x="205" y="340" width="30" height="90" rx="15" fill="#FED7AA" />
      <rect x="265" y="340" width="30" height="90" rx="15" fill="#FED7AA" />
      <!-- Sandales / Chaussures nettes -->
      <path d="M190 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#6D28D9" />
      <path d="M260 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#6D28D9" />
      <!-- Bras ballants stables -->
      <path d="M135 240 v100" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M365 240 v100" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique drapée -->
      <rect x="145" y="215" width="210" height="150" rx="40" fill="#8B5CF6" />
      <!-- Ombre nette sur la tunique pour donner de la profondeur (Duolingo 2.0) -->
      <path d="M145 270 C145 330, 355 330, 355 270 V325 C355 350, 145 350, 145 325 Z" fill="#6D28D9" opacity="0.3" />
    
    
      <rect x="295" y="280" width="50" height="80" rx="8" fill="#FEF08A" stroke="#1E293B" stroke-width="6" transform="rotate(20 295 280)" />
      <line x1="315" y1="280" x2="315" y2="360" stroke="#CA8A04" stroke-width="4" transform="rotate(20 295 280)" />
    
  </svg>