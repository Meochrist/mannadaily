      <path d="M 350 220 Q 385 275, 370 325" fill="none" stroke="#FED7AA" stroke-width="22" stroke-linecap="round" />
    
    
      <path d="M 175 210 H 325 L 365 350 C 365 365, 135 365, 135 350 Z" fill="#EC4899" />
      <!-- Ceinture dorée et drapés de la robe -->
      <path d="M 168 250 C 210 262, 290 262, 332 250 L 338 270 C 290 282, 210 282, 162 270 Z" fill="#FBBF24" stroke="#1E293B" stroke-width="4.5" />
      <path d="M 195 275 Q 250 330, 210 355" fill="none" stroke="#BE185D" stroke-width="5" stroke-linecap="round" opacity="0.4" />
      <path d="M 295 275 Q 250 330, 280 355" fill="none" stroke="#BE185D" stroke-width="5" stroke-linecap="round" opacity="0.4" />
    
    
  </svg>