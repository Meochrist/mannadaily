      <path d="M 350 210 Q 390 160, 400 125" fill="none" stroke="#FED7AA" stroke-width="22" stroke-linecap="round" />
    
    
      <path d="M 175 210 H 325 L 365 350 C 365 365, 135 365, 135 350 Z" fill="#EC4899" />
      <!-- Ceinture dorée et drapés de la robe -->
