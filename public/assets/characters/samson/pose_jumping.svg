<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes repliées vers l'extérieur pour un saut dynamique -->
      <path d="M 210 330 Q 175 365, 185 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 150 385 C 150 398, 195 400, 195 385 C 195 372, 165 372, 150 385 Z" fill="#B45309" transform="rotate(-15 150 385)" />
      
      <path d="M 290 330 Q 325 365, 315 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 350 385 C 350 398, 305 400, 305 385 C 305 372, 335 372, 350 385 Z" fill="#B45309" transform="rotate(15 350 385)" />
      
      <!-- Bras levés de joie et de victoire -->
      <path d="M 150 210 Q 110 160, 100 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
      <path d="M 350 210 Q 390 160, 400 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
    
    
      <!-- Tunique étirée vers le haut -->
      <path d="M 175 195 C 155 230, 130 300, 155 335 C 180 350, 320 350, 345 335 C 370 300, 345 230, 325 195 Z" fill="#EA580C" />
      <path d="M 155 335 C 180 350, 320 350, 345 335 C 335 305, 165 305, 155 335 Z" fill="#B45309" opacity="0.25" />
    
    
      <!-- Reliefs musculaires pectoraux / abdominaux organiques -->
      <path d="M 190 235 C 215 242, 285 242, 310 235" stroke="#B45309" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45" />
      <path d="M 250 238 L 250 295" stroke="#B45309" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.45" />
      <!-- Abdos en courbes douces -->
      <path d="M 225 265 Q 250 270 275 265" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />
      <path d="M 225 285 Q 250 290 275 285" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />
      <!-- Bracelets de force dorés courbés sur les bras -->
      <rect x="110" y="270" width="30" height="22" rx="6" fill="#F59E0B" stroke="#1E293B" stroke-width="4.5" transform="rotate(-10 110 270)" />
      <rect x="360" y="270" width="30" height="22" rx="6" fill="#F59E0B" stroke="#1E293B" stroke-width="4.5" transform="rotate(10 360 270)" />
    
  </svg>