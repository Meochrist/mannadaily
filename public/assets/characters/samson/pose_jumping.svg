<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes pliées vers l'extérieur -->
      <path d="M210 340 L180 395" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M160 390 h40 c5 0, 5 15, 0 15 h-40 z" fill="#B45309" transform="rotate(-15 160 390)" />
      <path d="M290 340 L320 395" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M300 390 h40 c5 0, 5 15, 0 15 h-40 z" fill="#B45309" transform="rotate(15 300 390)" />
      <!-- Bras levés en signe de victoire -->
      <path d="M140 220 Q90 145, 80 120" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M360 220 Q410 145, 420 120" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <rect x="145" y="200" width="210" height="150" rx="40" fill="#EA580C" />
    
    
      <!-- Pectoraux / Reliefs musculaires -->
      <path d="M185 240 Q250 255 315 240" stroke="#B45309" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />
      <path d="M250 245 v60" stroke="#B45309" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />
      <circle cx="215" cy="275" r="5" fill="#B45309" opacity="0.3" />
      <circle cx="285" cy="275" r="5" fill="#B45309" opacity="0.3" />
      <!-- Bracelets de force dorés sur les bras -->
      <rect x="120" y="280" width="30" height="20" rx="4" fill="#F59E0B" transform="rotate(-5 120 280)" />
      <rect x="350" y="280" width="30" height="20" rx="4" fill="#F59E0B" transform="rotate(5 350 280)" />
    
  </svg>