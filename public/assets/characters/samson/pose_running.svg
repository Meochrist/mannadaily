<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambe arrière en course -->
      <path d="M200 340 L160 400" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M140 395 h40 c5 0, 5 15, 0 15 h-40 z" fill="#B45309" transform="rotate(-15 140 395)" />
      <!-- Jambe avant en foulée -->
      <path d="M280 340 Q320 375, 300 420" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M285 415 h40 c5 0, 5 15, 0 15 h-40 z" fill="#B45309" transform="rotate(10 285 415)" />
      <!-- Bras de course fléchis -->
      <path d="M140 230 Q90 260, 115 300" fill="none" stroke="#FDBA74" stroke-width="18" stroke-linecap="round" />
      <path d="M360 220 Q400 190, 385 155" fill="none" stroke="#FDBA74" stroke-width="18" stroke-linecap="round" />
    
    
      <!-- Torse projeté vers l'avant -->
      <rect x="145" y="210" width="210" height="150" rx="40" fill="#EA580C" transform="skewX(-8 250 285)" />
    
    
      <!-- Pectoraux / Reliefs musculaires -->
      <path d="M185 240 Q250 255 315 240" stroke="#B45309" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />
      <path d="M250 245 v60" stroke="#B45309" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />
      <circle cx="215" cy="275" r="5" fill="#B45309" opacity="0.3" />
      <circle cx="285" cy="275" r="5" fill="#B45309" opacity="0.3" />
      <!-- Bracelets de force dorés sur les bras -->
      <rect x="120" y="280" width="30" height="20" rx="4" fill="#F59E0B" transform="rotate(-5 120 280)" />
      <rect x="350" y="280" width="30" height="20" rx="4" fill="#F59E0B" transform="rotate(5 350 280)" />
    
  </svg>