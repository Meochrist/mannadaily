<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes repliées vers l'extérieur pour un saut dynamique -->
      <path d="M 210 330 Q 175 365, 185 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 150 385 C 150 398, 195 400, 195 385 C 195 372, 165 372, 150 385 Z" fill="#64748B" transform="rotate(-15 150 385)" />
      
      <path d="M 290 330 Q 325 365, 315 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 350 385 C 350 398, 305 400, 305 385 C 305 372, 335 372, 350 385 Z" fill="#64748B" transform="rotate(15 350 385)" />
      
      <!-- Bras levés de joie et de victoire -->
      <path d="M 150 210 Q 110 160, 100 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
      <path d="M 350 210 Q 390 160, 400 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
    
    
      <!-- Tunique étirée vers le haut -->
      <path d="M 175 195 C 155 230, 130 300, 155 335 C 180 350, 320 350, 345 335 C 370 300, 345 230, 325 195 Z" fill="#E2E8F0" />
      <path d="M 155 335 C 180 350, 320 350, 345 335 C 335 305, 165 305, 155 335 Z" fill="#64748B" opacity="0.25" />
    
    
      <g id="harp" transform="translate(115, 255) rotate(12)">
        <path d="M 0 0 C 15 -10, 45 -5, 52 12 C 55 25, 42 68, 42 68 C 42 68, 15 65, 0 45 Z" fill="none" stroke="#F59E0B" stroke-width="7.5" />
        <!-- Barre centrale et cordes -->
        <line x1="0" y1="0" x2="42" y2="68" stroke="#F59E0B" stroke-width="7.5" />
        <line x1="12" y1="5" x2="12" y2="50" stroke="#D97706" stroke-width="2.5" />
        <line x1="22" y1="7" x2="22" y2="55" stroke="#D97706" stroke-width="2.5" />
        <line x1="32" y1="9" x2="32" y2="60" stroke="#D97706" stroke-width="2.5" />
      </g>
    
  </svg>