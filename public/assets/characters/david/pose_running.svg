<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes en plein mouvement asymétrique de course -->
      <path d="M 210 330 Q 165 375, 185 410" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 155 405 C 155 418, 195 420, 195 405 C 195 392, 170 392, 155 405 Z" fill="#64748B" transform="rotate(-15 155 405)" />
      
      <path d="M 285 330 Q 325 360, 290 415" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 270 410 C 270 423, 310 425, 310 410 C 310 398, 285 398, 270 410 Z" fill="#64748B" transform="rotate(15 270 410)" />
      
      <!-- Bras fléchis de façon dynamique -->
      <path d="M 145 210 Q 100 240, 130 285" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M 355 210 Q 380 180, 360 145" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique penchée vers l'avant (dynamisme de la course) -->
      <g transform="skewX(-8 250 280)">
        <path d="M 175 210 C 150 245, 125 315, 150 350 C 175 365, 325 365, 350 350 C 375 315, 350 245, 325 210 Z" fill="#E2E8F0" />
        <path d="M 150 350 C 175 365, 325 365, 350 350 C 340 310, 160 310, 150 350 Z" fill="#64748B" opacity="0.25" />
      </g>
    
    
      <g id="harp" transform="translate(115, 255) rotate(12)">
        <path d="M 0 0 C 15 -10, 45 -5, 52 12 C 55 25, 42 68, 42 68 C 42 68, 15 65, 0 45 Z" fill="none" stroke="#F59E0B" stroke-width="7.5" />
        <!-- Barre centrale et cordes -->
        <line x1="0" y1="0" x2="42" y2="68" stroke="#F59E0B" stroke-width="7.5" />
        <line x1="12" y1="5" x2="12" y2="50" stroke="#D97706" stroke-width="2.5" />
        <line x1="22" y1="7" x2="22" y2="55" stroke="#D97706" stroke-width="2.5" />
        <line x1="32" y1="9" x2="32" y2="60" stroke="#D97706" stroke-width="2.5" />
      </g>
    
  </svg>