<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes droites -->
      <rect x="205" y="340" width="30" height="90" rx="15" fill="#FDBA74" />
      <rect x="265" y="340" width="30" height="90" rx="15" fill="#FDBA74" />
      <!-- Sandales / Chaussures nettes -->
      <path d="M190 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#64748B" />
      <path d="M260 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#64748B" />
      <!-- Bras ballants stables -->
      <path d="M135 240 v100" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M365 240 v100" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique drapée -->
      <rect x="145" y="215" width="210" height="150" rx="40" fill="#E2E8F0" />
      <!-- Ombre nette sur la tunique pour donner de la profondeur (Duolingo 2.0) -->
      <path d="M145 270 C145 330, 355 330, 355 270 V325 C355 350, 145 350, 145 325 Z" fill="#64748B" opacity="0.3" />
    
    
      <g id="harp" transform="translate(120, 260) rotate(10)">
        <path d="M 0 0 L 50 10 L 40 70 C 10 70, 0 40, 0 0 Z" fill="none" stroke="#F59E0B" stroke-width="8" />
        <line x1="10" y1="5" x2="10" y2="65" stroke="#D97706" stroke-width="2" />
        <line x1="20" y1="7" x2="20" y2="65" stroke="#D97706" stroke-width="2" />
        <line x1="30" y1="9" x2="30" y2="65" stroke="#D97706" stroke-width="2" />
      </g>
    
  </svg>