<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes repliées vers l'extérieur pour un saut dynamique -->
      <path d="M 210 330 Q 175 365, 185 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 150 385 C 150 398, 195 400, 195 385 C 195 372, 165 372, 150 385 Z" fill="#047857" transform="rotate(-15 150 385)" />
      
      <path d="M 290 330 Q 325 365, 315 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 350 385 C 350 398, 305 400, 305 385 C 305 372, 335 372, 350 385 Z" fill="#047857" transform="rotate(15 350 385)" />
      
      <!-- Bras levés de joie et de victoire -->
      <path d="M 150 210 Q 110 160, 100 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
      <path d="M 350 210 Q 390 160, 400 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
    
    
      <!-- Tunique étirée vers le haut -->
      <path d="M 175 195 C 155 230, 130 300, 155 335 C 180 350, 320 350, 345 335 C 370 300, 345 230, 325 195 Z" fill="#10B981" />
      <path d="M 155 335 C 180 350, 320 350, 345 335 C 335 305, 165 305, 155 335 Z" fill="#047857" opacity="0.25" />
    
    
      <!-- Bouclier de bronze fixé au bras -->
      <g id="shield" transform="translate(365, 275)">
        <circle cx="0" cy="0" r="42" fill="#D97706" stroke="#1E293B" stroke-width="6.5" />
        <circle cx="0" cy="0" r="28" fill="#047857" stroke="#1E293B" stroke-width="4.5" />
        <circle cx="0" cy="0" r="10" fill="#D97706" stroke="#1E293B" stroke-width="3" />
        <!-- Clous dorés autour du bouclier -->
        <circle cx="-30" cy="0" r="3" fill="#FFFFFF" />
        <circle cx="30" cy="0" r="3" fill="#FFFFFF" />
        <circle cx="0" cy="-30" r="3" fill="#FFFFFF" />
        <circle cx="0" cy="30" r="3" fill="#FFFFFF" />
      </g>
    
  </svg>