<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes en plein mouvement asymétrique de course -->
      <path d="M 210 330 Q 165 375, 185 410" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 155 405 C 155 418, 195 420, 195 405 C 195 392, 170 392, 155 405 Z" fill="#047857" transform="rotate(-15 155 405)" />
      
      <path d="M 285 330 Q 325 360, 290 415" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 270 410 C 270 423, 310 425, 310 410 C 310 398, 285 398, 270 410 Z" fill="#047857" transform="rotate(15 270 410)" />
      
      <!-- Bras fléchis de façon dynamique -->
      <path d="M 145 210 Q 100 240, 130 285" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M 355 210 Q 380 180, 360 145" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique penchée vers l'avant (dynamisme de la course) -->
      <g transform="skewX(-8 250 280)">
        <path d="M 175 210 C 150 245, 125 315, 150 350 C 175 365, 325 365, 350 350 C 375 315, 350 245, 325 210 Z" fill="#10B981" />
        <path d="M 150 350 C 175 365, 325 365, 350 350 C 340 310, 160 310, 150 350 Z" fill="#047857" opacity="0.25" />
      </g>
    
    
      <!-- Bouclier de bronze fixé au bras -->
      <g id="shield" transform="translate(365, 275)">
        <circle cx="0" cy="0" r="42" fill="#D97706" stroke="#1E293B" stroke-width="6.5" />
        <circle cx="0" cy="0" r="28" fill="#047857" stroke="#1E293B" stroke-width="4.5" />
        <circle cx="0" cy="0" r="10" fill="#D97706" stroke="#1E293B" stroke-width="3" />
        <!-- Clous dorés autour du bouclier -->
        <circle cx="-30" cy="0" r="3" fill="#FFFFFF" />
        <circle cx="30" cy="0" r="3" fill="#FFFFFF" />
        <circle cx="0" cy="-30" r="3" fill="#FFFFFF" />
        <circle cx="0" cy="30" r="3" fill="#FFFFFF" />
      </g>
    
  </svg>