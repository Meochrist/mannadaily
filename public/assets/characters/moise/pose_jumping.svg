<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes pliées vers l'extérieur -->
      <path d="M210 340 L180 395" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M160 390 h40 c5 0, 5 15, 0 15 h-40 z" fill="#991B1B" transform="rotate(-15 160 390)" />
      <path d="M290 340 L320 395" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M300 390 h40 c5 0, 5 15, 0 15 h-40 z" fill="#991B1B" transform="rotate(15 300 390)" />
      <!-- Bras levés en signe de victoire -->
      <path d="M140 220 Q90 145, 80 120" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M360 220 Q410 145, 420 120" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <rect x="145" y="200" width="210" height="150" rx="40" fill="#DC2626" />
    
    
      <g id="tablets" transform="translate(110, 240) rotate(-5)">
        <rect x="0" y="0" width="70" height="90" rx="15" fill="#9CA3AF" stroke="#1E293B" stroke-width="6" />
        <line x1="35" y1="5" x2="35" y2="85" stroke="#4B5563" stroke-width="4" />
        <!-- Inscriptions hébraïques factices (points/traits fins net) -->
        <line x1="10" y1="25" x2="25" y2="25" stroke="#374151" stroke-width="3" stroke-linecap="round" />
        <line x1="10" y1="45" x2="28" y2="45" stroke="#374151" stroke-width="3" stroke-linecap="round" />
        <line x1="45" y1="25" x2="60" y2="25" stroke="#374151" stroke-width="3" stroke-linecap="round" />
        <line x1="45" y1="45" x2="58" y2="45" stroke="#374151" stroke-width="3" stroke-linecap="round" />
      </g>
    
  </svg>