<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes repliées vers l'extérieur pour un saut dynamique -->
      <path d="M 210 330 Q 175 365, 185 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 150 385 C 150 398, 195 400, 195 385 C 195 372, 165 372, 150 385 Z" fill="#991B1B" transform="rotate(-15 150 385)" />
      
      <path d="M 290 330 Q 325 365, 315 395" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 350 385 C 350 398, 305 400, 305 385 C 305 372, 335 372, 350 385 Z" fill="#991B1B" transform="rotate(15 350 385)" />
      
      <!-- Bras levés de joie et de victoire -->
      <path d="M 150 210 Q 110 160, 100 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
      <path d="M 350 210 Q 390 160, 400 125" fill="none" stroke="#FDBA74" stroke-width="22" stroke-linecap="round" />
    
    
      <!-- Tunique étirée vers le haut -->
      <path d="M 175 195 C 155 230, 130 300, 155 335 C 180 350, 320 350, 345 335 C 370 300, 345 230, 325 195 Z" fill="#DC2626" />
      <path d="M 155 335 C 180 350, 320 350, 345 335 C 335 305, 165 305, 155 335 Z" fill="#991B1B" opacity="0.25" />
    
    
      <g id="tablets" transform="translate(100, 235) rotate(-6)">
        <rect x="0" y="0" width="75" height="95" rx="18" fill="#9CA3AF" stroke="#1E293B" stroke-width="6" />
        <line x1="37.5" y1="5" x2="37.5" y2="90" stroke="#4B5563" stroke-width="4.5" />
        <!-- Commandements hébraïques schématisés -->
        <path d="M 10 25 h 18" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 10 45 h 15" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 10 65 h 20" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 25 h 18" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 45 h 20" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 65 h 15" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
      </g>
    
  </svg>