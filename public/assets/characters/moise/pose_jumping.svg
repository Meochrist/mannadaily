<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    
      <!-- Jambes fléchies en l'air -->
      <rect x="180" y="325" width="35" height="75" rx="17.5" fill="#FDE68A" transform="rotate(-30 180 325)" />
      <rect x="285" y="325" width="35" height="75" rx="17.5" fill="#FDE68A" transform="rotate(30 285 325)" />
      <!-- Pieds -->
      <rect x="140" y="365" width="50" height="20" rx="10" fill="#9CA3AF" transform="rotate(-30 140 365)" />
      <rect x="310" y="365" width="50" height="20" rx="10" fill="#9CA3AF" transform="rotate(30 310 365)" />
      <!-- Bras levés de joie -->
      <rect x="110" y="140" width="35" height="110" rx="17.5" fill="#FDE68A" transform="rotate(45 110 140)" />
      <rect x="355" y="140" width="35" height="110" rx="17.5" fill="#FDE68A" transform="rotate(-45 355 140)" />
    
    
      <!-- Torse -->
      <rect x="155" y="190" width="190" height="150" rx="40" fill="#4B5563" />
    
    
      <rect x="210" y="260" width="80" height="100" rx="15" fill="#9CA3AF" />
