<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes en plein mouvement asymétrique de course -->
      <path d="M 210 330 Q 165 375, 185 410" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 155 405 C 155 418, 195 420, 195 405 C 195 392, 170 392, 155 405 Z" fill="#991B1B" transform="rotate(-15 155 405)" />
      
      <path d="M 285 330 Q 325 360, 290 415" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 270 410 C 270 423, 310 425, 310 410 C 310 398, 285 398, 270 410 Z" fill="#991B1B" transform="rotate(15 270 410)" />
      
      <!-- Bras fléchis de façon dynamique -->
      <path d="M 145 210 Q 100 240, 130 285" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M 355 210 Q 380 180, 360 145" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique penchée vers l'avant (dynamisme de la course) -->
      <g transform="skewX(-8 250 280)">
        <path d="M 175 210 C 150 245, 125 315, 150 350 C 175 365, 325 365, 350 350 C 375 315, 350 245, 325 210 Z" fill="#DC2626" />
        <path d="M 150 350 C 175 365, 325 365, 350 350 C 340 310, 160 310, 150 350 Z" fill="#991B1B" opacity="0.25" />
      </g>
    
    
      <g id="tablets" transform="translate(100, 235) rotate(-6)">
        <rect x="0" y="0" width="75" height="95" rx="18" fill="#9CA3AF" stroke="#1E293B" stroke-width="6" />
        <line x1="37.5" y1="5" x2="37.5" y2="90" stroke="#4B5563" stroke-width="4.5" />
        <!-- Commandements hébraïques schématisés -->
        <path d="M 10 25 h 18" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 10 45 h 15" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 10 65 h 20" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 25 h 18" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 45 h 20" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 65 h 15" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
      </g>
    
  </svg>