<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambe arrière en course -->
      <path d="M200 340 L160 400" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M140 395 h40 c5 0, 5 15, 0 15 h-40 z" fill="#991B1B" transform="rotate(-15 140 395)" />
      <!-- Jambe avant en foulée -->
      <path d="M280 340 Q320 375, 300 420" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M285 415 h40 c5 0, 5 15, 0 15 h-40 z" fill="#991B1B" transform="rotate(10 285 415)" />
      <!-- Bras de course fléchis -->
      <path d="M140 230 Q90 260, 115 300" fill="none" stroke="#FDBA74" stroke-width="18" stroke-linecap="round" />
      <path d="M360 220 Q400 190, 385 155" fill="none" stroke="#FDBA74" stroke-width="18" stroke-linecap="round" />
    
    
      <!-- Torse projeté vers l'avant -->
      <rect x="145" y="210" width="210" height="150" rx="40" fill="#DC2626" transform="skewX(-8 250 285)" />
    
    
      <g id="tablets" transform="translate(110, 240) rotate(-5)">
        <rect x="0" y="0" width="70" height="90" rx="15" fill="#9CA3AF" stroke="#1E293B" stroke-width="6" />
        <line x1="35" y1="5" x2="35" y2="85" stroke="#4B5563" stroke-width="4" />
        <!-- Inscriptions hébraïques factices (points/traits fins net) -->
        <line x1="10" y1="25" x2="25" y2="25" stroke="#374151" stroke-width="3" stroke-linecap="round" />
        <line x1="10" y1="45" x2="28" y2="45" stroke="#374151" stroke-width="3" stroke-linecap="round" />
        <line x1="45" y1="25" x2="60" y2="25" stroke="#374151" stroke-width="3" stroke-linecap="round" />
        <line x1="45" y1="45" x2="58" y2="45" stroke="#374151" stroke-width="3" stroke-linecap="round" />
      </g>
    
  </svg>