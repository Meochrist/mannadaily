<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre de contact propre style Duolingo (le composant CharacterRenderer applique aussi son ombre de sol) -->
    <ellipse cx="250" cy="425" rx="85" ry="11" fill="#E2E8F0" />
    
      <!-- Jambes rentrées vers l'intérieur (tristesse) -->
      <path d="M 215 340 L 230 410" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 285 340 L 270 410" fill="none" stroke="#FDBA74" stroke-width="24" stroke-linecap="round" />
      <path d="M 200 405 C 200 418, 240 418, 240 400 C 240 390, 215 390, 200 405 Z" fill="#991B1B" />
      <path d="M 300 405 C 300 418, 260 418, 260 400 C 260 390, 285 390, 300 405 Z" fill="#991B1B" />
      <!-- Bras repliés vers le corps (abattement) -->
      <path d="M 145 220 Q 120 280, 140 330" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
      <path d="M 355 220 Q 380 280, 360 330" fill="none" stroke="#FDBA74" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique affaissée -->
      <path d="M 175 220 C 155 250, 135 320, 155 345 C 180 358, 320 358, 345 345 C 365 320, 345 250, 325 220 Z" fill="#DC2626" />
      <path d="M 155 345 C 180 358, 320 358, 345 345 C 335 315, 165 315, 155 345 Z" fill="#991B1B" opacity="0.25" />
    
    
      <g id="tablets" transform="translate(100, 235) rotate(-6)">
        <rect x="0" y="0" width="75" height="95" rx="18" fill="#9CA3AF" stroke="#1E293B" stroke-width="6" />
        <line x1="37.5" y1="5" x2="37.5" y2="90" stroke="#4B5563" stroke-width="4.5" />
        <!-- Commandements hébraïques schématisés -->
        <path d="M 10 25 h 18" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 10 45 h 15" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 10 65 h 20" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 25 h 18" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 45 h 20" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
        <path d="M 47 65 h 15" stroke="#374151" stroke-width="4.5" stroke-linecap="round" />
      </g>
    
  </svg>