<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambe arrière en course -->
      <path d="M200 340 L160 400" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M140 395 h40 c5 0, 5 15, 0 15 h-40 z" fill="#1D4ED8" transform="rotate(-15 140 395)" />
      <!-- Jambe avant en foulée -->
      <path d="M280 340 Q320 375, 300 420" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M285 415 h40 c5 0, 5 15, 0 15 h-40 z" fill="#1D4ED8" transform="rotate(10 285 415)" />
      <!-- Bras de course fléchis -->
      <path d="M140 230 Q90 260, 115 300" fill="none" stroke="#FED7AA" stroke-width="18" stroke-linecap="round" />
      <path d="M360 220 Q400 190, 385 155" fill="none" stroke="#FED7AA" stroke-width="18" stroke-linecap="round" />
    
    
      <!-- Torse projeté vers l'avant -->
      <rect x="145" y="210" width="210" height="150" rx="40" fill="#2563EB" transform="skewX(-8 250 285)" />
    
    
      <g id="key" transform="translate(325, 260) rotate(-15)">
        <circle cx="20" cy="20" r="20" fill="none" stroke="#FBBF24" stroke-width="8" />
        <rect x="16" y="40" width="8" height="60" fill="#FBBF24" rx="2" />
        <rect x="24" y="80" width="16" height="8" fill="#FBBF24" rx="2" />
        <rect x="24" y="92" width="16" height="8" fill="#FBBF24" rx="2" />
      </g>
    
  </svg>