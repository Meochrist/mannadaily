<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Ombre nette au sol -->
    <ellipse cx="250" cy="450" rx="90" ry="12" fill="#E2E8F0" />
    
      <!-- Jambes droites -->
      <rect x="205" y="340" width="30" height="90" rx="15" fill="#FED7AA" />
      <rect x="265" y="340" width="30" height="90" rx="15" fill="#FED7AA" />
      <!-- Sandales / Chaussures nettes -->
      <path d="M190 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#1D4ED8" />
      <path d="M260 420 h50 c6 0, 6 15, 0 15 h-50 z" fill="#1D4ED8" />
      <!-- Bras ballants stables -->
      <path d="M135 240 v100" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
      <path d="M365 240 v100" fill="none" stroke="#FED7AA" stroke-width="20" stroke-linecap="round" />
    
    
      <!-- Tunique drapée -->
      <rect x="145" y="215" width="210" height="150" rx="40" fill="#2563EB" />
      <!-- Ombre nette sur la tunique pour donner de la profondeur (Duolingo 2.0) -->
      <path d="M145 270 C145 330, 355 330, 355 270 V325 C355 350, 145 350, 145 325 Z" fill="#1D4ED8" opacity="0.3" />
    
    
      <g id="key" transform="translate(325, 260) rotate(-15)">
        <circle cx="20" cy="20" r="20" fill="none" stroke="#FBBF24" stroke-width="8" />
        <rect x="16" y="40" width="8" height="60" fill="#FBBF24" rx="2" />
        <rect x="24" y="80" width="16" height="8" fill="#FBBF24" rx="2" />
        <rect x="24" y="92" width="16" height="8" fill="#FBBF24" rx="2" />
      </g>
    
  </svg>