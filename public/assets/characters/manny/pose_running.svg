<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <!-- Couverture inclinée course -->
        <rect x="115" y="130" width="270" height="220" rx="30" fill="#4F46E5" transform="skewX(-10) rotate(-2 250 240)" />
        <!-- Pages blanches -->
        <path d="M130 140 h110 v190 h-110 z M260 140 h110 v190 h-110 z" fill="#FFFFFF" transform="skewX(-10) rotate(-2 250 240)" />
        <!-- Tranche -->
        <rect x="240" y="135" width="20" height="210" rx="5" fill="#F1F5F9" transform="skewX(-10) rotate(-2 250 240)" />
        <!-- Bras de course -->
        <path d="M70 210 Q100 240 80 280" stroke="#64748B" stroke-width="25" stroke-linecap="round" fill="none" />
        <path d="M430 210 Q400 240 420 280" stroke="#64748B" stroke-width="25" stroke-linecap="round" fill="none" />
        <!-- Jambes de course actives -->
        <path d="M175 350 Q150 400 200 420" stroke="#64748B" stroke-width="25" stroke-linecap="round" fill="none" />
        <path d="M275 350 Q325 375 300 420" stroke="#64748B" stroke-width="25" stroke-linecap="round" fill="none" />
      </svg>